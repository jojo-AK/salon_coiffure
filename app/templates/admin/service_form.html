{% extends "base.html" %}
{% block title %}{% if service %}Modifier{% else %}Ajouter{% endif %} un service – MonSalon{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <h2 class="fw-bold mb-4">
      <i class="bi bi-scissors text-warning"></i>
      {% if service %}Modifier le service{% else %}Ajouter un service{% endif %}
    </h2>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nom du service</label>
            <input type="text" name="nom" class="form-control"
                   placeholder="Ex: Dégradé, Tresse, Coupe simple..."
                   value="{{ service.nom if service else '' }}" required />
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">Prix (FCFA)</label>
              <input type="number" name="prix" class="form-control"
                     placeholder="Ex: 3000" min="0" step="100"
                     value="{{ service.prix|int if service else '' }}" required />
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Durée (minutes)</label>
              <input type="number" name="duree_minutes" class="form-control"
                     placeholder="Ex: 30, 60, 180" min="5" step="5"
                     value="{{ service.duree_minutes if service else '' }}" required />
              <div class="form-text text-muted">Coupe simple ≈ 30, Tresse ≈ 180</div>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Description (optionnel)</label>
            <textarea name="description" class="form-control" rows="2"
                      placeholder="Brève description du service">{{ service.description if service else '' }}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-gold flex-fill py-2">
              <i class="bi bi-check-lg"></i>
              {% if service %}Enregistrer{% else %}Ajouter{% endif %}
            </button>
            <a href="{{ url_for('admin.services') }}" class="btn btn-outline-secondary px-4">
              Annuler
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
