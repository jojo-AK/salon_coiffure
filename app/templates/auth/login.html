{% extends "base.html" %}
{% block title %}Connexion – {{ profil_salon.nom_salon if profil_salon else 'MonSalon' }}{% endblock %}

{% block content %}
<div class="auth-card">
  <h2>Connexion</h2>
  <p class="auth-sub">Accédez à votre espace client</p>

  <form method="POST">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="votre@email.com" required />
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" name="password" placeholder="••••••••" required />
    </div>
    <div style="display:flex; align-items:center; gap:.6rem; margin-bottom:1.5rem;">
      <input type="checkbox" name="remember" id="remember" style="width:16px; height:16px; accent-color:var(--accent); cursor:pointer;">
      <label for="remember" style="font-size:.85rem; color:var(--text-muted); cursor:pointer;">Se souvenir de moi</label>
    </div>
    <button type="submit" class="btn-primary" style="width:100%; justify-content:center; padding:1rem;">
      Se connecter
    </button>
  </form>

  <div style="text-align:center; margin-top:1.5rem; font-size:.88rem; color:var(--text-muted);">
    Pas encore de compte ?
    <a href="{{ url_for('auth.register') }}" style="color:var(--accent); font-weight:600;">S'inscrire</a>
  </div>
</div>
{% endblock %}
