{% extends "base.html" %}
{% block title %}Connexion – MonSalon{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-5">
    <div class="card border-0 shadow-sm mt-4">
      <div class="card-body p-4">
        <h3 class="fw-bold mb-1 text-center">Connexion</h3>
        <p class="text-muted text-center small mb-4">Accédez à votre espace client</p>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" placeholder="votre@email.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Mot de passe</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required />
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" name="remember" class="form-check-input" id="remember" />
            <label class="form-check-label text-muted small" for="remember">Se souvenir de moi</label>
          </div>
          <button type="submit" class="btn btn-gold w-100 py-2">
            <i class="bi bi-box-arrow-in-right"></i> Se connecter
          </button>
        </form>

        <hr class="my-3" />
        <p class="text-center text-muted small mb-0">
          Pas encore de compte ?
          <a href="{{ url_for('auth.register') }}" class="text-warning fw-semibold">S'inscrire</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
