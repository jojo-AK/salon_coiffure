{% extends "base.html" %}
{% block title %}Inscription – MonSalon{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-6 col-lg-5">
    <div class="card border-0 shadow-sm mt-4">
      <div class="card-body p-4">
        <h3 class="fw-bold mb-1 text-center">Créer un compte</h3>
        <p class="text-muted text-center small mb-4">Réservez facilement vos rendez-vous</p>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nom complet</label>
            <input type="text" name="nom" class="form-control" placeholder="Votre nom" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" placeholder="votre@email.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Mot de passe</label>
            <input type="password" name="password" class="form-control" placeholder="Minimum 6 caractères" required minlength="6" />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirmer le mot de passe</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="Répétez le mot de passe" required />
          </div>
          <button type="submit" class="btn btn-gold w-100 py-2">
            <i class="bi bi-person-check"></i> Créer mon compte
          </button>
        </form>

        <hr class="my-3" />
        <p class="text-center text-muted small mb-0">
          Déjà inscrit ?
          <a href="{{ url_for('auth.login') }}" class="text-warning fw-semibold">Se connecter</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
