{% extends "base.html" %}
{% block title %}Inscription – {{ profil_salon.nom_salon if profil_salon else 'MonSalon' }}{% endblock %}

{% block content %}
<div class="auth-card">
  <h2>Créer un compte</h2>
  <p class="auth-sub">Réservez facilement vos rendez-vous</p>

  <form method="POST">
    <div class="form-group">
      <label>Nom complet</label>
      <input type="text" name="nom" placeholder="Votre nom" required />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="votre@email.com" required />
    </div>
    <div class="form-group">
      <label>Téléphone <span style="color:var(--text-muted); font-weight:400;">(optionnel)</span></label>
      <input type="tel" name="telephone" placeholder="+228 90 00 00 00" />
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" name="password" placeholder="Minimum 6 caractères" required minlength="6" />
    </div>
    <div class="form-group" style="margin-bottom:1.5rem;">
      <label>Confirmer le mot de passe</label>
      <input type="password" name="confirm_password" placeholder="Répétez le mot de passe" required />
    </div>
    <button type="submit" class="btn-primary" style="width:100%; justify-content:center; padding:1rem;">
      Créer mon compte
    </button>
  </form>

  <div style="text-align:center; margin-top:1.5rem; font-size:.88rem; color:var(--text-muted);">
    Déjà inscrit ?
    <a href="{{ url_for('auth.login') }}" style="color:var(--accent); font-weight:600;">Se connecter</a>
  </div>
</div>
{% endblock %}
